<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Scales of Justice</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background-color: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Inter', sans-serif; }
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background-color: #FFFFFF;
            position: relative;
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 300px;
        }
        
        .main-content {
            padding: 80px 40px; /* keep top padding (80px) per requirements; reduced horizontal padding to save space */
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 2;
        }
        
        .accent-bar {
            background-color: #1A1A1A;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 60px 40px;
            box-sizing: border-box;
        }
        
        .decorative-line {
            position: absolute;
            top: 80px;
            left: 60px;
            width: 100px;
            height: 8px;
            background-color: #800020; /* Oxblood */
        }
        
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 96px;
            line-height: 0.9;
            color: #1A1A1A;
            margin-bottom: 20px; /* reduced from 30px to save vertical space */
            text-transform: uppercase;
            letter-spacing: -2px;
        }
        
        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            line-height: 1.3;
            color: #4A4A4A;
            margin-bottom: 40px; /* reduced from 60px */
            font-weight: 400;
            font-style: italic;
            max-width: 800px;
            border-left: 4px solid #800020;
            padding-left: 20px;
        }
        
        .meta-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: #1A1A1A;
            border-top: 1px solid #E0E0E0;
            padding-top: 20px; /* reduced from 30px */
            width: 100%;
        }
        
        .meta-item {
            display: flex;
            flex-direction: column;
        }
        
        .meta-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #800020;
            margin-bottom: 5px;
            font-weight: 600;
        }
        
        .meta-value {
            font-size: 16px;
            font-weight: 600;
        }
        
        /* Abstract Scales Graphic using CSS */
        .scales-graphic {
            position: absolute;
            right: -100px;
            top: -100px;
            width: 600px;
            height: 600px;
            border: 2px solid #F5F5F5;
            border-radius: 50%;
            z-index: 1;
        }
        
        .scales-graphic::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            border: 1px solid #F0F0F0;
            border-radius: 50%;
        }
        
        .side-text {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            color: #FFFFFF;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 120px;
            opacity: 0.1;
            position: absolute;
            top: 0;
            right: 0;
            height: 100%;
            overflow: hidden;
            white-space: nowrap;
            line-height: 300px; /* Centers it in the 300px bar */
        }

    </style>
</head>
<body>
    <div class="slide-container">
        <div class="decorative-line"></div>
        <div class="scales-graphic"></div>
        
        <div class="main-content">
            <h1>The Scales<br>of Justice</h1>
            <h2>An Analysis of Legal Representation and Sentencing Outcomes in U.S. Federal Courts</h2>
            
            <div class="meta-info">
                <div class="meta-item">
                    <span class="meta-label">Author</span>
                    <span class="meta-value">Barbara D. Gaskins</span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">Course</span>
                    <span class="meta-value">DSC 680: Applied Data Science</span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">Date</span>
                    <span class="meta-value">March 2026</span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">Data Source</span>
                    <span class="meta-value">U.S. Sentencing Commission, FY 2024</span>
                </div>
            </div>
        </div>
        
        <div class="accent-bar">
            <div class="side-text">JUSTICE</div>
        </div>
    </div>
</body>
</html>
